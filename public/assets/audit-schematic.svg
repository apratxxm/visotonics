<svg viewBox="0 0 1000 750" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono',monospace">
<defs>
<marker id="aah" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
<path d="M1,0 L4,7 L7,0" fill="none" stroke="#F4F5F7" stroke-width="1"/>
</marker>
</defs>
<rect width="1000" height="750" fill="#101216"/>

<!-- corner registration ticks -->
<g stroke="#F4F5F7" stroke-opacity="0.4">
<path d="M56,48 h10 M61,43 v10"/>
<path d="M934,48 h10 M939,43 v10"/>
<path d="M56,702 h10 M61,697 v10"/>
<path d="M934,702 h10 M939,697 v10"/>
</g>

<!-- kicker -->
<text x="60" y="66" fill="#A6ADB8" font-size="15" letter-spacing="1.6">DOCK 02 — CONTINUOUS RECORD</text>

<!-- continuous footage strip -->
<line x1="60" y1="106" x2="940" y2="106" stroke="#F4F5F7" stroke-opacity="0.28"/>
<line x1="60" y1="96" x2="60" y2="116" stroke="#F4F5F7" stroke-opacity="0.4"/>
<line x1="940" y1="96" x2="940" y2="116" stroke="#F4F5F7" stroke-opacity="0.4"/>
<g stroke="#F4F5F7" stroke-opacity="0.14">
<line x1="124" y1="100" x2="124" y2="112"/><line x1="188" y1="100" x2="188" y2="112"/><line x1="252" y1="100" x2="252" y2="112"/><line x1="316" y1="100" x2="316" y2="112"/><line x1="380" y1="100" x2="380" y2="112"/><line x1="444" y1="100" x2="444" y2="112"/>
<line x1="556" y1="100" x2="556" y2="112"/><line x1="620" y1="100" x2="620" y2="112"/><line x1="684" y1="100" x2="684" y2="112"/><line x1="748" y1="100" x2="748" y2="112"/><line x1="812" y1="100" x2="812" y2="112"/><line x1="876" y1="100" x2="876" y2="112"/>
</g>
<text x="60" y="138" fill="#A6ADB8" font-size="12" letter-spacing="1.2">CONTINUOUS FOOTAGE — UNINDEXED</text>

<!-- arrow: strip → event detected -->
<line x1="500" y1="146" x2="500" y2="182" stroke="#F4F5F7" stroke-opacity="0.4" marker-end="url(#aah)"/>

<!-- box 1: EVENT DETECTED -->
<rect x="350" y="188" width="300" height="96" fill="none" stroke="#F4F5F7" stroke-width="1.5"/>
<line x1="350" y1="236" x2="650" y2="236" stroke="#F4F5F7" stroke-opacity="0.28"/>
<text x="500" y="222" text-anchor="middle" fill="#F4F5F7" font-size="15" letter-spacing="1">EVENT</text>
<text x="500" y="264" text-anchor="middle" fill="#F4F5F7" font-size="15" letter-spacing="1">DETECTED</text>

<!-- arrow: event → order bound -->
<line x1="500" y1="284" x2="500" y2="320" stroke="#F4F5F7" stroke-opacity="0.4" marker-end="url(#aah)"/>

<!-- box 2: ORD# BOUND -->
<rect x="304" y="326" width="392" height="60" fill="none" stroke="#F4F5F7" stroke-opacity="0.55"/>
<text x="500" y="362" text-anchor="middle" fill="#F4F5F7" font-size="15" letter-spacing="1">ORD #———— · BOUND</text>

<!-- arrow: order → search -->
<line x1="500" y1="386" x2="500" y2="422" stroke="#F4F5F7" stroke-opacity="0.4" marker-end="url(#aah)"/>

<!-- box 3: SEARCH BY ID -->
<rect x="336" y="428" width="328" height="60" fill="none" stroke="#F4F5F7" stroke-opacity="0.55"/>
<text x="500" y="464" text-anchor="middle" fill="#F4F5F7" font-size="15" letter-spacing="1">SEARCH BY ID</text>

<!-- arrow: search → clip -->
<line x1="500" y1="488" x2="500" y2="524" stroke="#F4F5F7" stroke-opacity="0.4" marker-end="url(#aah)"/>

<!-- box 4: CLIP (with waveform-ish squiggle standing in for the retrieved frame) -->
<rect x="410" y="530" width="180" height="96" fill="none" stroke="#F4F5F7" stroke-width="1.5"/>
<path d="M424,600 L452,562 L472,584 L500,548 L534,594 L566,566" fill="none" stroke="#F4F5F7" stroke-opacity="0.35"/>
<text x="500" y="612" text-anchor="middle" fill="#A6ADB8" font-size="13" letter-spacing="1">CLIP</text>

<!-- tagline -->
<line x1="60" y1="668" x2="940" y2="668" stroke="#F4F5F7" stroke-opacity="0.16"/>
<text x="500" y="702" text-anchor="middle" fill="#A6ADB8" font-size="14" letter-spacing="1">THE ID IS THE INDEX — NOT THE TIMELINE.</text>
</svg>
