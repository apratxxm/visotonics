<rect x="162" y="194" width="186" height="276" fill="url(#ccorrc)" stroke="none"/>
<rect x="162" y="194" width="186" height="276" opacity="0.3"/>
<line x1="255" y1="182" x2="255" y2="482" opacity="0.5"/>
<line x1="196" y1="194" x2="196" y2="458" opacity="0.75"/><circle cx="196" cy="204" r="3" opacity="0.8"/><circle cx="196" cy="448" r="3" opacity="0.8"/>
<line x1="314" y1="194" x2="314" y2="458" opacity="0.75"/><circle cx="314" cy="204" r="3" opacity="0.8"/><circle cx="314" cy="448" r="3" opacity="0.8"/>
<rect x="150" y="182" width="16" height="12" opacity="0.9"/><rect x="344" y="182" width="16" height="12" opacity="0.9"/>
<rect x="150" y="470" width="16" height="12" opacity="0.9"/><rect x="344" y="470" width="16" height="12" opacity="0.9"/>
</g>

<!-- four cameras, every face -->
<g id="cams" opacity="0.9">
<rect x="52" y="214" width="28" height="18"/><circle cx="66" cy="223" r="5"/>
<line x1="80" y1="223" x2="150" y2="244" stroke-dasharray="4 5" opacity="0.45"/>
<rect x="420" y="214" width="28" height="18"/><circle cx="434" cy="223" r="5"/>
<line x1="420" y1="223" x2="360" y2="244" stroke-dasharray="4 5" opacity="0.45"/>
<rect x="52" y="420" width="28" height="18"/><circle cx="66" cy="429" r="5"/>
<line x1="80" y1="429" x2="150" y2="420" stroke-dasharray="4 5" opacity="0.45"/>
<rect x="420" y="420" width="28" height="18"/><circle cx="434" cy="429" r="5"/>
<line x1="420" y1="429" x2="360" y2="420" stroke-dasharray="4 5" opacity="0.45"/>
</g>
</g>

<!-- detection box (orange) on the container — now on the left -->
<g stroke="#ED510C" fill="none">
<rect x="204" y="322" width="104" height="92" stroke-width="1.5" fill="#ED510C" fill-opacity="0.14"/>
</g>
<path d="M232,352 Q246,338 264,346 Q282,340 288,358 Q296,372 282,382 Q274,396 256,390 Q240,394 232,380 Q224,366 232,352 Z" stroke="#F4F5F7" fill="none" opacity="0.6"/>
<path d="M246,360 Q256,354 266,362 Q272,370 262,376 Q252,380 246,372 Q242,366 246,360 Z" stroke="#F4F5F7" fill="none" opacity="0.4"/>
<g fill="#ED510C" font-size="12" letter-spacing="1" text-anchor="middle">
<text x="255" y="512">SEVERITY — HIGH · CONF 0.87</text>
</g>
<text x="255" y="536" text-anchor="middle" fill="#F4F5F7" font-size="12" letter-spacing="1" opacity="0.85">SURVEYOR — ALERTED</text>
<text x="255" y="586" text-anchor="middle" fill="#F4F5F7" font-size="11" letter-spacing="1" opacity="0.55">MULTI-CAMERA — EVERY FACE, EVERY LIFT</text>

