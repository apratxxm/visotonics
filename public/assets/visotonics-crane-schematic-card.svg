<svg viewBox="0 0 1000 750" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono',monospace">
<defs>
<pattern id="ccorrc" width="12" height="10" patternUnits="userSpaceOnUse">
<line x1="3" y1="0" x2="3" y2="10" stroke="#F4F5F7" stroke-width="1" opacity="0.6"/>
<line x1="8" y1="0" x2="8" y2="10" stroke="#F4F5F7" stroke-width="1" opacity="0.22"/>
</pattern>
</defs>
<rect width="1000" height="750" fill="#101216"/>

<!-- content sits in a 28→600 band (h.572); shifted +61 to center it in the
     750-tall canvas (89 margin top/bottom) instead of hugging the top -->
<g transform="translate(0,61)">

<!-- column divider — tight to the content band, not the full canvas -->
<line x1="500" y1="28" x2="500" y2="600" stroke="#F4F5F7" stroke-width="1" opacity="0.14"/>

<!-- ============================ LEFT — CRANE LIFT ============================ -->
<text x="44" y="46" fill="#F4F5F7" font-size="17" letter-spacing="2" opacity="0.92">LIFT 0142</text>
<text x="44" y="70" fill="#F4F5F7" font-size="12" letter-spacing="2" opacity="0.7">ALL FACES — SIMULTANEOUS</text>

<g stroke="#F4F5F7" fill="none" stroke-width="1">
<!-- spreader cables + beam -->
<line x1="255" y1="96" x2="170" y2="132" opacity="0.8"/>
<line x1="255" y1="96" x2="340" y2="132" opacity="0.8"/>
<rect x="150" y="132" width="210" height="24" opacity="0.9"/>
<line x1="168" y1="156" x2="168" y2="182" opacity="0.8"/>
<line x1="342" y1="156" x2="342" y2="182" opacity="0.8"/>

<!-- container -->
