<rect x="644" y="92" width="88" height="66" opacity="0.7"/>
<path d="M655,110 q11,-10 22,0 t22,0 t22,0" opacity="0.45"/>
<path d="M655,134 q11,-10 22,0 t22,0 t22,0" opacity="0.45"/>
<g><rect x="748" y="92" width="88" height="66" stroke="#ED510C" stroke-width="1.5"/>
<line x1="763" y1="98" x2="763" y2="152" opacity="0.75"/><line x1="781" y1="98" x2="781" y2="152" opacity="0.4"/><line x1="799" y1="98" x2="799" y2="152" opacity="0.75"/><line x1="817" y1="98" x2="817" y2="152" opacity="0.4"/>
</g>
<rect x="852" y="92" width="88" height="66" opacity="0.7"/>
<path d="M863,118 q11,-9 22,0 t22,0 t22,0" opacity="0.45"/>
<path d="M863,138 q11,-9 22,0 t22,0 t22,0" opacity="0.45"/>
</g>
<text x="792" y="84" fill="#ED510C" font-size="12" letter-spacing="1" text-anchor="middle">✓</text>

<g fill="#F4F5F7" font-size="12" letter-spacing="1" text-anchor="middle">
<text x="740" y="196" opacity="0.9">SHARPEST FRAME — SELECTED</text>
<text x="740" y="220" font-size="11" opacity="0.55">VIBRATION — COMPENSATED · MOTION BLUR — CORRECTED</text>
</g>

<!-- timeline ruler -->
<g stroke="#F4F5F7" opacity="0.7">
<line x1="540" y1="308" x2="940" y2="308"/>
<line x1="540" y1="300" x2="540" y2="316"/><line x1="620" y1="303" x2="620" y2="313"/><line x1="700" y1="303" x2="700" y2="313"/><line x1="780" y1="303" x2="780" y2="313"/><line x1="860" y1="303" x2="860" y2="313"/><line x1="940" y1="300" x2="940" y2="316"/>
</g>
<rect x="737" y="305" width="6" height="6" fill="#ED510C"/>
<text x="740" y="340" text-anchor="middle" fill="#F4F5F7" font-size="12" letter-spacing="1" opacity="0.9">14:02:11</text>
<text x="740" y="376" text-anchor="middle" fill="#F4F5F7" font-size="11" letter-spacing="1" opacity="0.75">TIME-STAMPED AT DISCHARGE / LOAD</text>

<!-- chain of custody -->
<line x1="540" y1="430" x2="940" y2="430" stroke="#F4F5F7" stroke-width="1" opacity="0.18"/>
<text x="740" y="486" text-anchor="middle" fill="#F4F5F7" font-size="14" letter-spacing="2" opacity="0.7">VESSEL → YARD → GATE</text>
<text x="740" y="512" text-anchor="middle" fill="#ED510C" font-size="11" letter-spacing="2">CHAIN OF CUSTODY</text>

